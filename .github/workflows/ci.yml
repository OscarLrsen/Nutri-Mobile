name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI – Lint / Type-check / Doctor
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Expo config doctor
        run: npx expo-doctor
        env:
          # Real values aren't needed for config validation, but env.ts
          # (Zod-validated) throws if these are entirely absent — see lib/env.ts.
          EXPO_PUBLIC_API_URL: http://localhost:5069
          EXPO_PUBLIC_SUPABASE_URL: https://example.supabase.co
          EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
